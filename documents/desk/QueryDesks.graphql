query QueryDesks($filter: DeskFilter, $correlationId: String) {
  desks(filter: $filter, correlationId: $correlationId) {
    results {
      id
      name
      creationDate
      modifiedDate
      relevance
      owner {
        id
      }
      state
      description
      objectives
      instructions
      bureau {
        id
      }
      agentCount
    }
  }
}
