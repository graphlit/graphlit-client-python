query QuerySkills($filter: SkillFilter, $correlationId: String) {
  skills(filter: $filter, correlationId: $correlationId) {
    results {
      id
      name
      creationDate
      modifiedDate
      relevance
      owner {
        id
      }
      state
      description
      identifier
      correlationId
      text
      skillOwner
      feed {
        id
        name
      }
      arguments {
        name
        description
        required
      }
      collections {
        id
        name
      }
    }
  }
}
