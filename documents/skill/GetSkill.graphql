query GetSkill($id: ID!, $correlationId: String) {
  skill(id: $id, correlationId: $correlationId) {
    id
    name
    creationDate
    modifiedDate
    owner {
      id
    }
    state
    user {
      id
    }
    description
    identifier
    correlationId
    text
    skillOwner
    feed {
      id
      name
    }
    arguments {
      name
      description
      required
    }
    collections {
      id
      name
    }
  }
}
