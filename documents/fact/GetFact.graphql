query GetFact($id: ID!, $correlationId: String) {
  fact(id: $id, correlationId: $correlationId) {
    id
    user {
      id
    }
    creationDate
    owner {
      id
    }
    state
    text
    validAt
    invalidAt
    relevance
    mentions {
      type
      observable {
        id
        name
      }
      start
      end
    }
    assertions {
      text
      mentions {
        type
        observable {
          id
          name
        }
        start
        end
      }
    }
    feeds {
      id
      name
    }
    content {
      id
      name
    }
    conversation {
      id
      name
    }
    persona {
      id
      name
    }
    sourceType
    kind
    category
    confidence
    evidence {
      type
      entity {
        id
      }
      text
      confidence
      citations {
        sourceType
        source {
          id
        }
        uri
        title
        index
        text
        metadata
        relevance
        confidence
        startOffset
        endOffset
        startTime
        endTime
        pageNumber
        frameNumber
      }
    }
  }
}
