query QueryFactsClusters($filter: FactFilter, $clusters: EntityClustersInput, $correlationId: String) {
  facts(filter: $filter, clusters: $clusters, correlationId: $correlationId) {
    results {
      id
      creationDate
      owner {
        id
      }
      state
      text
      validAt
      invalidAt
      relevance
      mentions {
        type
        observable {
          id
          name
        }
        start
        end
      }
      assertions {
        text
        mentions {
          type
          observable {
            id
            name
          }
          start
          end
        }
      }
      feeds {
        id
        name
      }
      content {
        id
        name
      }
      conversation {
        id
        name
      }
      persona {
        id
        name
      }
      sourceType
      kind
      category
      confidence
      evidence {
        type
        entity {
          id
        }
        text
        confidence
        citations {
          sourceType
          source {
            id
          }
          uri
          title
          index
          text
          metadata
          relevance
          confidence
          startOffset
          endOffset
          startTime
          endTime
          pageNumber
          frameNumber
        }
      }
    }
    clusters {
      entities {
        id
        name
      }
      similarity
    }
  }
}
