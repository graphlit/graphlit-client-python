query GetAgent($id: ID!, $correlationId: String) {
  agent(id: $id, correlationId: $correlationId) {
    id
    name
    creationDate
    modifiedDate
    owner {
      id
    }
    state
    correlationId
    type
    description
    specification {
      id
    }
    filter {
      types
      fileTypes
      feeds {
        id
      }
    }
    schedulePolicy {
      recurrenceType
      repeatInterval
      cron
      timeZoneId
    }
    channels {
      type
      identifier
      instructions
      label
    }
    connectors {
      id
    }
    timeout
    prompt
    scratchpad
  }
}
