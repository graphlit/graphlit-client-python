query QueryAgents($filter: AgentFilter, $correlationId: String) {
  agents(filter: $filter, correlationId: $correlationId) {
    results {
      id
      name
      creationDate
      modifiedDate
      relevance
      owner {
        id
      }
      state
      correlationId
      type
      description
      specification {
        id
      }
      filter {
        types
        fileTypes
        feeds {
          id
        }
      }
      schedulePolicy {
        recurrenceType
        repeatInterval
        cron
        timeZoneId
      }
      channels {
        type
        identifier
        instructions
        label
      }
      connectors {
        id
      }
      timeout
      prompt
      scratchpad
      callbackUri
    }
  }
}
