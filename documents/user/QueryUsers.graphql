query QueryUsers($filter: UserFilter, $correlationId: String) {
  users(filter: $filter, correlationId: $correlationId) {
    results {
      id
      name
      creationDate
      modifiedDate
      relevance
      owner {
        id
      }
      state
      type
      identifier
      description
      connectors {
        id
        name
        state
        type
        authentication {
          type
          token
          apiKey
          microsoft {
            tenantId
            clientId
            clientSecret
          }
          google {
            clientId
            clientSecret
          }
          oauth {
            provider
            clientId
            clientSecret
            refreshToken
            accessToken
            redirectUri
            metadata
          }
          arcade {
            authorizationId
            provider
            metadata
          }
        }
        integration {
          type
          uri
          slack {
            token
            channel
          }
          email {
            from
            subject
            to
          }
          twitter {
            consumerKey
            consumerSecret
            accessTokenKey
            accessTokenSecret
          }
          mcp {
            token
            type
          }
        }
        channel {
          type
          slack {
            botToken
            signingSecret
            appId
          }
          teams {
            botId
            botPassword
            tenantId
          }
          discord {
            botToken
            applicationId
            publicKey
          }
          telegram {
            botToken
            secretToken
            botUsername
          }
          whatsApp {
            accessToken
            appSecret
            phoneNumberId
            verifyToken
          }
          googleChat {
            credentials
            projectId
          }
        }
      }
      personas {
        id
        name
        state
        type
        identifier
        platform
        displayName
        timezone
        role
        instructions
        facts {
          id
          text
        }
      }
      quota {
        credits
      }
      credits
      lastCreditsDate
      accumulatedCredits
    }
  }
}
