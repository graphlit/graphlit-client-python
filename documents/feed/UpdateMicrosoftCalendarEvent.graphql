mutation UpdateMicrosoftCalendarEvent($properties: MicrosoftCalendarEventsInput!, $eventId: String!, $input: CalendarEventUpdateInput!) {
  updateMicrosoftCalendarEvent(properties: $properties, eventId: $eventId, input: $input) {
    eventId
    summary
    startDateTime
    endDateTime
    location
    attendees
    isOnlineMeeting
    meetingLink
    description
    status
    organizer
  }
}
