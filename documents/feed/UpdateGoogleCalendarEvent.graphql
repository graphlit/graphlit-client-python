mutation UpdateGoogleCalendarEvent($properties: GoogleCalendarEventsInput!, $eventId: String!, $input: CalendarEventUpdateInput!) {
  updateGoogleCalendarEvent(properties: $properties, eventId: $eventId, input: $input) {
    eventId
    summary
    startDateTime
    endDateTime
    location
    attendees
    isOnlineMeeting
    meetingLink
    description
    status
    organizer
  }
}
