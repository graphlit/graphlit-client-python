query GetConnector($id: ID!, $correlationId: String) {
  connector(id: $id, correlationId: $correlationId) {
    id
    name
    creationDate
    modifiedDate
    owner {
      id
    }
    state
    user {
      id
    }
    type
    authentication {
      type
      token
      apiKey
      microsoft {
        tenantId
        clientId
        clientSecret
      }
      google {
        clientId
        clientSecret
      }
      oauth {
        provider
        clientId
        clientSecret
        refreshToken
        accessToken
        redirectUri
        metadata
      }
      arcade {
        authorizationId
        provider
        metadata
      }
    }
    integration {
      type
      uri
      slack {
        token
        channel
      }
      email {
        from
        subject
        to
      }
      twitter {
        consumerKey
        consumerSecret
        accessTokenKey
        accessTokenSecret
      }
      mcp {
        token
        type
      }
    }
    channel {
      type
      slack {
        botToken
        signingSecret
        appId
      }
      teams {
        botId
        botPassword
        tenantId
      }
      discord {
        botToken
        applicationId
        publicKey
      }
      telegram {
        botToken
        secretToken
        botUsername
      }
      whatsApp {
        accessToken
        appSecret
        phoneNumberId
        verifyToken
      }
      googleChat {
        credentials
        projectId
      }
    }
  }
}
